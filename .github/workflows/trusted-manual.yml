name: Trusted Manual Qualification

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Authenticated real-provider smoke selection
        type: choice
        options: [none, claude, codex, both]
        default: none
      external_ssh_target:
        description: Optional bounded host or user@host using existing BatchMode authentication
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: trusted-manual-qualification
  cancel-in-progress: false

env:
  GOTOOLCHAIN: local
  GOFLAGS: -mod=readonly

jobs:
  provider-smoke:
    name: protected manual / real provider
    if: inputs.provider != 'none'
    runs-on: [self-hosted, macOS, intent-sh-trusted]
    environment: trusted-qualification
    timeout-minutes: 10
    steps:
      - name: Check out source without retaining a repository credential
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Verify approved macOS runner identity
        run: test "$(uname -s)" = Darwin
      - name: Run one bounded authenticated smoke with no artifact publication
        env:
          PROVIDER_SELECTION: ${{ inputs.provider }}
        run: |
          case "$PROVIDER_SELECTION" in
            claude|codex) providers=$PROVIDER_SELECTION ;;
            both) providers=claude,codex ;;
            *) printf 'invalid provider selection\n' >&2; exit 1 ;;
          esac
          INTENT_SH_REAL_PROVIDER_SMOKE="$providers" make real-provider-test

  external-ssh:
    name: protected manual / external SSH
    if: inputs.external_ssh_target != ''
    runs-on: [self-hosted, macOS, intent-sh-trusted]
    environment: trusted-qualification
    timeout-minutes: 45
    steps:
      - name: Check out source without retaining a repository credential
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Verify approved macOS runner identity
        run: test "$(uname -s)" = Darwin
      - name: Validate target and use only existing BatchMode and known-host state
        env:
          SSH_TARGET_INPUT: ${{ inputs.external_ssh_target }}
        run: |
          [[ $SSH_TARGET_INPUT =~ ^[A-Za-z0-9_.@:%+\[\]-]{1,255}$ ]]
          [[ $SSH_TARGET_INPUT != -* ]]
          [[ $SSH_TARGET_INPUT != @* && $SSH_TARGET_INPUT != *@ && $SSH_TARGET_INPUT != *@*@* ]]
          INTENT_SH_TEST_SSH_TARGET="$SSH_TARGET_INPUT" make external-ssh-test
