name: Required CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: required-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local
  GOFLAGS: -mod=readonly
  OPENSPEC_TELEMETRY: "0"

jobs:
  static:
    name: required / static
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Set up exact Node for locked CI tooling
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: .github/ci-tools/package-lock.json
      - name: Run read-only integrity gates
        run: make static-check


  unit:
    name: required / unit
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install current Bash
        run: |
          brew install bash
          echo "INTENT_SH_TEST_BASH=$(brew --prefix bash)/bin/bash" >> "$GITHUB_ENV"
      - name: Run strict unit manifest
        run: make test-unit QUALIFICATION_DIR="$RUNNER_TEMP/qualification"
      - name: Retain sanitized failure summary
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-${{ runner.arch }}-summary
          path: ${{ runner.temp }}/qualification
          if-no-files-found: ignore
          retention-days: 7

  race:
    name: required / race
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install current Bash
        run: |
          brew install bash
          echo "INTENT_SH_TEST_BASH=$(brew --prefix bash)/bin/bash" >> "$GITHUB_ENV"
      - name: Run race qualification
        run: make race-test

  native-pty:
    name: required / native PTY
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install current Bash
        run: |
          brew install bash
          echo "INTENT_SH_TEST_BASH=$(brew --prefix bash)/bin/bash" >> "$GITHUB_ENV"
      - name: Record bounded host and shell metadata
        run: bash .github/scripts/print-ci-metadata.sh
      - name: Run strict native PTY manifest
        run: make native-pty-test QUALIFICATION_DIR="$RUNNER_TEMP/qualification"
      - name: Retain sanitized failure summary
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-pty-${{ runner.arch }}-summary
          path: ${{ runner.temp }}/qualification
          if-no-files-found: ignore
          retention-days: 7

  tmux:
    name: required / tmux
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install current Bash and tmux
        run: |
          brew install bash tmux
          echo "INTENT_SH_TEST_BASH=$(brew --prefix bash)/bin/bash" >> "$GITHUB_ENV"
          echo "INTENT_SH_TEST_TMUX=$(command -v tmux)" >> "$GITHUB_ENV"
      - name: Record bounded host and terminal metadata
        run: bash .github/scripts/print-ci-metadata.sh
      - name: Run strict private-socket tmux manifest
        run: make tmux-test QUALIFICATION_DIR="$RUNNER_TEMP/qualification"
      - name: Retain sanitized failure summary
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tmux-${{ runner.arch }}-summary
          path: ${{ runner.temp }}/qualification
          if-no-files-found: ignore
          retention-days: 7

  artifact-build:
    name: required / reproducible artifacts
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build each target twice and inspect its embedded protocol
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/intent-sh-artifacts
        run: make artifact-build artifact-inspect
      - name: Distribute only the workflow-internal qualification artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: intent-sh-qualified-artifacts
          path: ${{ runner.temp }}/intent-sh-artifacts
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  artifact-inspection:
    name: required / inspected macOS artifacts
    needs: artifact-build
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download distributed qualification artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: intent-sh-qualified-artifacts
          path: ${{ runner.temp }}/intent-sh-artifacts
      - name: Restore executable transport bits and inspect both Mach-O artifacts
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/intent-sh-artifacts
        run: |
          chmod 700 "$ARTIFACT_DIR"/intent-sh-darwin-amd64 "$ARTIFACT_DIR"/intent-sh-darwin-arm64
          make artifact-inspect

  artifact-native:
    name: required / native macOS artifact
    needs: artifact-build
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install current Bash
        run: |
          brew install bash
          echo "INTENT_SH_TEST_BASH=$(brew --prefix bash)/bin/bash" >> "$GITHUB_ENV"
      - name: Download distributed qualification artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: intent-sh-qualified-artifacts
          path: ${{ runner.temp }}/intent-sh-artifacts
      - name: Select only this runner's artifact
        run: |
          artifact_arch=$(go env GOARCH)
          artifact_path="$RUNNER_TEMP/intent-sh-artifacts/intent-sh-darwin-$artifact_arch"
          test -f "$artifact_path" && test ! -L "$artifact_path"
          chmod 700 "$artifact_path"
          echo "INTENT_SH_TEST_BINARY=$artifact_path" >> "$GITHUB_ENV"
      - name: Verify bounded version and embedded adapters
        run: |
          "$INTENT_SH_TEST_BINARY" version
          "$INTENT_SH_TEST_BINARY" init bash | grep -F -q '__intent_sh_protocol_version=2'
          "$INTENT_SH_TEST_BINARY" init zsh | grep -F -q '__intent_sh_protocol_version=2'
      - name: Record bounded host and shell metadata
        run: bash .github/scripts/print-ci-metadata.sh
      - name: Run install, setup, doctor, rewrite, safety, downgrade, and removal journeys
        run: make artifact-test QUALIFICATION_DIR="$RUNNER_TEMP/qualification"
      - name: Retain sanitized failure summary
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-native-${{ runner.arch }}-summary
          path: ${{ runner.temp }}/qualification
          if-no-files-found: ignore
          retention-days: 7

  coverage:
    name: required / executable coverage
    runs-on: macos-15
    timeout-minutes: 70
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Go from go.mod
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install current Bash and tmux
        run: |
          brew install bash tmux
          echo "INTENT_SH_TEST_BASH=$(brew --prefix bash)/bin/bash" >> "$GITHUB_ENV"
          echo "INTENT_SH_TEST_TMUX=$(command -v tmux)" >> "$GITHUB_ENV"
      - name: Record bounded coverage host, shell, and tmux metadata
        run: bash .github/scripts/print-ci-metadata.sh
      - name: Run unit plus native and tmux executable coverage
        env:
          COVERAGE_DIR: ${{ runner.temp }}/coverage
        run: make coverage-test
      - name: Retain only sanitized coverage and manifest failure summaries
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: executable-coverage-summary
          path: |
            ${{ runner.temp }}/coverage/summary.json
            ${{ runner.temp }}/coverage/results
          if-no-files-found: ignore
          retention-days: 7

  aggregate:
    name: required / aggregate
    if: always()
    needs: [static, unit, race, native-pty, tmux, artifact-build, artifact-inspection, artifact-native, coverage]
    runs-on: macos-15
    timeout-minutes: 5
    steps:
      - name: Require every deterministic qualification family
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [[ ,$RESULTS, == *,failure,* || ,$RESULTS, == *,cancelled,* || ,$RESULTS, == *,skipped,* ]]; then
            printf 'required qualification did not complete successfully: %s\n' "$RESULTS" >&2
            exit 1
          fi
